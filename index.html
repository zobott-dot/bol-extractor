      area.innerHTML = '<button class="filter-btn" id="filter-btn">Filter PDF</button>';
    }

    function getFilterFilename() {
      const base = originalFileName.replace(/\.pdf$/i, '').replace(/[\/\\:*?"<>|]/g, '_');
      const jobs = currentResults
        .filter(function(r) { return r.trips && r.trips.length > 0; })
        .map(function(r) { return r.jobNumber; });

      let name = 'bol-filtered-' + base + '-' + jobs.join('-');

      if (name.length + 4 > 120) {
        let truncated = 'bol-filtered-' + base;
        for (const job of jobs) {
          const next = truncated + '-' + job;
          if (next.length + 8 > 120) {
            truncated += '-etc';
            break;
          }
          truncated = next;
        }
        name = truncated;
      }

      return name + '.pdf';
    }

    async function generateFilteredPdf() {
      if (!filterSections || !originalPdfBuffer) return;

      const statusEl = document.getElementById('filter-status');
      const genBtn = document.getElementById('filter-generate-btn');

      if (typeof PDFLib === 'undefined') {
        if (statusEl) {
          statusEl.textContent = 'PDF filtering is unavailable \u2014 the required library could not be loaded. Check your internet connection and reload the page.';
          statusEl.style.color = 'var(--error)';
        }
        return;
      }

      // Collect selected page indices (0-based for pdf-lib)
      const pageIndices = new Set();
      for (const s of filterSections) {
        if (!s.checked) continue;
        for (let p = s.startPage; p <= s.endPage; p++) {
          pageIndices.add(p - 1);
        }
      }

      if (pageIndices.size === 0) return;

      const sortedIndices = [...pageIndices].sort(function(a, b) { return a - b; });

      if (genBtn) genBtn.disabled = true;
      if (statusEl) {
        statusEl.textContent = 'Generating filtered PDF\u2026';
        statusEl.className = 'filter-status';
        statusEl.style.color = '';
      }

      try {
        const srcDoc = await PDFLib.PDFDocument.load(originalPdfBuffer);
        const newDoc = await PDFLib.PDFDocument.create();

        const copiedPages = await newDoc.copyPages(srcDoc, sortedIndices);
        for (const page of copiedPages) {
          newDoc.addPage(page);
        }

        // Apply page numbering option
        const numbering = document.querySelector('input[name="filter-numbering"]:checked');
        const useOriginal = numbering && numbering.value === 'original';

        if (useOriginal) {
          try {
            const context = newDoc.context;
            // Build page label entries for contiguous runs of original pages
            const entries = [];
            for (let i = 0; i < sortedIndices.length; i++) {
              if (i === 0 || sortedIndices[i] !== sortedIndices[i - 1] + 1) {
                entries.push(i);
                entries.push({ S: 'D', St: sortedIndices[i] + 1 });
              }
            }
            const pageLabels = context.obj({ Nums: entries });
            newDoc.catalog.set(PDFLib.PDFName.of('PageLabels'), pageLabels);
          } catch (e) {
            // Page labels failed — fall back to sequential numbering silently
          }
        }

        const pdfBytes = await newDoc.save();
        const filename = getFilterFilename();

        // Trigger browser download
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        if (statusEl) {
          statusEl.textContent = 'Filtered PDF downloaded';
          statusEl.className = 'filter-status filter-status-success';
          statusEl.style.color = '';
        }
        if (genBtn) genBtn.disabled = false;

      } catch (err) {
        if (statusEl) {
          statusEl.textContent = 'Could not generate filtered PDF. ' + (err.message || '');
          statusEl.className = 'filter-status';
          statusEl.style.color = 'var(--error)';
        }
        if (genBtn) genBtn.disabled = false;
      }
    }
  </script>
</body>
