<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOL Extractor</title>
  <link rel="icon" type="image/png" href="BOL_icon.png">
  <link rel="apple-touch-icon" href="BOL_icon.png">
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js" async></script>
  <script>
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('bol-theme') || 'dark'
    );
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    [hidden] { display: none !important; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222632;
      --surface-raised: #252a38;
      --border: #2e3348;
      --border-focus: #5b8af0;
      --text: #e2e4eb;
      --text-muted: #8b90a5;
      --text-dim: #5c6178;
      --accent: #5b8af0;
      --accent-soft: rgba(91, 138, 240, 0.12);
      --accent-hover: #7ba3f7;
      --success: #4ade80;
      --success-soft: rgba(74, 222, 128, 0.1);
      --warn: #f0a45b;
      --warn-soft: rgba(240, 164, 91, 0.1);
      --error: #f07070;
      --error-soft: rgba(240, 112, 112, 0.1);
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
    }

    [data-theme="light"] {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-hover: #f0f1f4;
      --surface-raised: #e8eaef;
      --border: #d1d5e0;
      --border-focus: #4a7ae5;
      --text: #1a1d27;
      --text-muted: #5c6178;
      --text-dim: #8b90a5;
      --accent: #4a7ae5;
      --accent-soft: rgba(74, 122, 229, 0.1);
      --accent-hover: #3a68d4;
      --success: #16a34a;
      --success-soft: rgba(22, 163, 74, 0.08);
      --warn: #d97706;
      --warn-soft: rgba(217, 119, 6, 0.08);
      --error: #dc2626;
      --error-soft: rgba(220, 38, 38, 0.07);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    header { margin-bottom: 32px; }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .subtitle { color: var(--text-muted); font-size: 15px; }

    .theme-toggle {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .theme-toggle:hover { background: var(--surface-hover); border-color: var(--accent); }

    [data-theme="dark"] .theme-label-light { display: none; }
    [data-theme="dark"] .theme-label-dark { display: inline; }
    [data-theme="light"] .theme-label-dark { display: none; }
    [data-theme="light"] .theme-label-light { display: inline; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 14px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 16px;
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent); background: var(--accent-soft);
    }

    .drop-icon { display: block; font-size: 36px; margin-bottom: 12px; opacity: 0.7; }
    #drop-zone p { color: var(--text-muted); font-size: 14px; }
    #drop-zone .drop-hint { color: var(--text-dim); font-size: 12px; margin-top: 4px; }

    #progress-area { padding: 16px 0 0; }

    .progress-bar {
      height: 4px; background: var(--surface-raised); border-radius: 2px;
      overflow: hidden; margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      width: 0%; transition: width 0.15s ease;
    }

    .progress-text { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

    #file-info {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--success-soft); border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: var(--radius); padding: 12px 16px;
    }

    .file-info-content { display: flex; align-items: center; gap: 16px; min-width: 0; }

    .file-name {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      color: var(--success); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .file-meta { font-family: var(--mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; }

    .file-clear-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1.3rem; padding: 0.5rem; border-radius: 4px; line-height: 1;
      transition: color 0.15s, background 0.15s; flex-shrink: 0;
    }
    .file-clear-btn:hover { color: var(--error); background: var(--error-soft); }

    .search-row { display: flex; gap: 8px; }

    #search-input {
      flex: 1; font-family: var(--mono); font-size: 14px; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); outline: none; transition: border-color 0.15s;
    }
    #search-input:focus { border-color: var(--border-focus); }
    #search-input:disabled { opacity: 0.4; cursor: not-allowed; }
    #search-input::placeholder { color: var(--text-dim); }

    #search-btn {
      font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 10px 24px;
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    #search-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .search-clear-btn {
      font-family: var(--sans); font-size: 0.85rem; font-weight: 500; padding: 0.6rem 1rem;
      background: var(--surface-raised); color: var(--text-muted); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .search-clear-btn:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }
    .search-clear-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint { font-size: 12px; color: var(--text-dim); margin-top: 10px; }

    #status-area:empty { display: none; }

    .status-msg { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; }
    .status-error { background: var(--error-soft); border: 1px solid rgba(240,112,112,0.2); color: var(--error); }
    .status-warn { background: var(--warn-soft); border: 1px solid rgba(240,164,91,0.2); color: var(--warn); }

    .results-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .results-header h2 { margin-bottom: 0; }
    .match-count { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }

    .grand-total {
      font-family: var(--mono); font-size: 0.85rem; color: var(--text-muted);
      padding: 0.65rem 1rem; background: var(--surface-raised);
      border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.25rem;
    }
    .grand-total strong { color: var(--text); font-weight: 600; }

    .job-group { margin-bottom: 1.25rem; }
    .job-group:last-child { margin-bottom: 0; }

    .job-group-header {
      display: flex; align-items: baseline; gap: 1rem; padding: 0.6rem 0.85rem;
      background: var(--surface-raised);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border); border-bottom: none;
    }
    .job-group-header.collapsed {
      border-radius: var(--radius);
      border-bottom: 1px solid var(--border);
    }

    .job-group-number { font-family: var(--mono); font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .job-group-total { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; color: var(--success); }
    .job-group-source { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); }
    .job-group-meta { font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono); margin-left: auto; }

    .job-group-variants {
      font-size: 0.72rem; color: var(--text-dim); padding: 0.3rem 0.85rem;
      background: var(--surface-raised); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    }

    .job-group-results {
      border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius);
      background: var(--bg); max-height: 300px; overflow-y: auto;
    }
    .job-group-results::-webkit-scrollbar { width: 6px; }
    .job-group-results::-webkit-scrollbar-track { background: transparent; }
    .job-group-results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .job-group-results::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .job-group-no-results {
      padding: 0.75rem 0.85rem; color: var(--text-dim); font-size: 0.8rem; font-style: italic;
      text-align: center; border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 var(--radius) var(--radius); background: var(--bg);
    }

    .result-item {
      display: flex; align-items: baseline; gap: 0.75rem; padding: 0.65rem 0.85rem;
      border-radius: 4px; transition: background 0.1s;
    }
    .result-item:hover { background: var(--surface-hover); }

    .page-badge {
      font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text-dim);
      background: var(--surface-raised); padding: 2px 8px; border-radius: 4px;
      white-space: nowrap; min-width: 44px; text-align: center; flex-shrink: 0;
    }

    .result-context {
      flex: 1; min-width: 0; font-family: var(--mono); font-size: 12px;
      color: var(--text-muted); line-height: 1.6; overflow-wrap: break-word;
    }

    .result-context mark {
      background: rgba(91, 138, 240, 0.25); color: var(--accent-hover);
      padding: 1px 3px; border-radius: 3px; font-weight: 500;
    }

    .result-qty {
      font-family: var(--mono); font-size: 0.78rem; font-weight: 500; color: var(--accent);
      white-space: nowrap; flex-shrink: 0; min-width: 5rem; text-align: right;
    }

    /* Phase 2 components */
    .source-badge {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px; text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .source-badge-manifest { color: var(--accent); background: var(--accent-soft); }
    .source-badge-sg360 { color: var(--success); background: var(--success-soft); }
    .source-badge-uniform { color: var(--warn); background: var(--warn-soft); }

    .expand-btn {
      font-family: var(--sans); font-size: 0.72rem; font-weight: 500;
      padding: 0.2rem 0.6rem; background: transparent; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 4px; cursor: pointer;
      transition: background 0.15s; margin-left: 0.5rem; white-space: nowrap;
    }
    .expand-btn:hover { background: var(--accent-soft); }

    .job-detail {
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--bg); overflow: hidden; max-height: 500px; overflow-y: auto;
    }
    .job-detail::-webkit-scrollbar { width: 6px; }
    .job-detail::-webkit-scrollbar-track { background: transparent; }
    .job-detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .trip-group { border-bottom: 1px solid var(--border); }
    .trip-group:last-child { border-bottom: none; }

    .trip-header {
      display: flex; align-items: baseline; gap: 0.6rem;
      padding: 0.5rem 0.85rem; background: var(--surface); font-size: 0.78rem;
    }
    .trip-id { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); }
    .trip-total { font-family: var(--mono); font-weight: 500; color: var(--success); margin-left: auto; }

    .dedup-note {
      font-size: 0.75rem; color: var(--text-dim); padding: 0.5rem 0.85rem;
      border-bottom: 1px solid var(--border); line-height: 1.5; font-style: italic;
    }

    .result-item.excluded { opacity: 0.45; }
    .result-item.excluded .result-qty { text-decoration: line-through; }
    .excluded-label {
      font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim);
      border: 1px solid var(--border); padding: 0.1rem 0.35rem; border-radius: 3px;
      white-space: nowrap; flex-shrink: 0;
    }

    .fallback-warn {
      background: var(--warn-soft); border: 1px solid rgba(240,164,91,0.2);
      color: var(--warn); padding: 0.65rem 1rem; border-radius: var(--radius);
      font-size: 0.8rem; margin-bottom: 1rem;
    }

    /* Phase 3: Confidence & Clarification */
    .job-group-flagged > .job-group-header {
      border-left: 3px solid var(--warn);
    }

    .clarification-wrapper {
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .clarification-wrapper.clarification-bottom {
      border-bottom: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .clarification-area {
      padding: 0.75rem 0.85rem;
      background: var(--warn-soft);
      border-left: 2px solid var(--warn);
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--text);
      transition: opacity 0.25s ease;
    }
    .clarification-area + .clarification-area {
      border-top: 1px solid rgba(240,164,91,0.15);
    }

    .clarification-title {
      font-weight: 600;
      color: var(--warn);
      margin-bottom: 0.35rem;
      font-size: 0.82rem;
    }

    .clarification-desc {
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-size: 0.78rem;
      line-height: 1.55;
    }

    .clarification-current {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
    }

    .clarification-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .clarification-btn {
      font-family: var(--sans); font-size: 0.78rem; font-weight: 500;
      padding: 0.38rem 0.85rem; border-radius: var(--radius); cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
    }
    .clarification-btn:hover {
      border-color: var(--accent); background: var(--accent-soft);
    }
    .clarification-btn-primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .clarification-btn-primary:hover {
      background: var(--accent-hover); border-color: var(--accent-hover);
    }

    .clarification-resolved {
      padding: 0.65rem 0.85rem;
      background: var(--success-soft);
      border-left: 2px solid var(--success);
      font-size: 0.78rem;
      color: var(--success);
      font-family: var(--mono);
      transition: opacity 0.25s ease;
    }

    /* Zero result */
    .job-group-not-found > .job-group-header {
      opacity: 0.55;
    }

    .not-found-badge {
      font-family: var(--mono); font-size: 0.65rem; font-weight: 600;
      padding: 0.12rem 0.4rem; border-radius: 3px;
      color: var(--text-dim); background: var(--surface-raised);
      border: 1px solid var(--border);
    }

    .zero-result-body {
      padding: 0.85rem;
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--bg); font-size: 0.82rem;
      color: var(--text-muted); line-height: 1.55;
    }
    .zero-result-body p + p { margin-top: 0.4rem; }

    .suggestion-link {
      color: var(--accent); cursor: pointer; text-decoration: underline;
      font-family: var(--mono); font-size: 0.82rem;
    }
    .suggestion-link:hover { color: var(--accent-hover); }

    /* Number update animation */
    @keyframes number-flash {
      0%, 20% { background: var(--warn-soft); border-radius: 3px; }
      100% { background: transparent; }
    }
    .number-updated { animation: number-flash 0.8s ease; }

    /* Variant breakdown in detail panel */
    .variant-summary {
      padding: 0.5rem 0.85rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text-muted); font-family: var(--mono);
      line-height: 1.6;
    }
    .variant-summary-title {
      font-weight: 600; color: var(--text-dim); font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem;
    }
    .variant-row {
      display: flex; align-items: baseline; gap: 0.5rem; padding: 0.1rem 0;
    }
    .variant-row::before { content: '\251C'; color: var(--border); flex-shrink: 0; }
    .variant-row:last-child::before { content: '\2514'; }
    .variant-name { color: var(--text); font-weight: 500; }
    .variant-detail { color: var(--text-dim); }
    .variant-total { color: var(--accent); margin-left: auto; }

    /* Phase 3.5: Filter PDF */
    .filter-btn {
      font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
      padding: 0.5rem 1.2rem;
      background: var(--surface-raised); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      margin-bottom: 1rem; display: inline-block;
    }
    .filter-btn:hover { border-color: var(--accent); background: var(--accent-soft); }

    .filter-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem;
    }

    .filter-panel-title {
      font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 0.25rem;
    }

    .filter-panel-subtitle {
      font-family: var(--mono); font-size: 0.82rem; color: var(--accent);
      margin-bottom: 0.75rem; font-weight: 500;
    }

    .filter-panel-desc {
      font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5;
    }

    .filter-sections-list {
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }

    .filter-section-item {
      display: flex; align-items: flex-start; gap: 0.6rem;
      padding: 0.65rem 0.85rem; border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .filter-section-item:last-child { border-bottom: none; }
    .filter-section-item:hover { background: var(--surface-hover); }

    .filter-section-item input[type="checkbox"] {
      margin-top: 0.2rem; accent-color: var(--accent); flex-shrink: 0;
    }

    .filter-section-info { flex: 1; min-width: 0; }

    .filter-section-pages {
      font-family: var(--mono); font-size: 0.82rem; color: var(--text); font-weight: 500;
    }

    .filter-section-jobs {
      font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); margin-top: 0.15rem;
    }

    .filter-numbering {
      margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
    }

    .filter-numbering-label {
      font-size: 0.82rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem;
    }

    .filter-radio {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.82rem; color: var(--text); padding: 0.15rem 0; cursor: pointer;
    }

    .filter-radio input[type="radio"] { accent-color: var(--accent); }

    .filter-actions {
      display: flex; gap: 0.6rem; margin-top: 1rem; align-items: center; flex-wrap: wrap;
    }

    .filter-generate-btn {
      font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
      padding: 0.5rem 1.2rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s;
    }
    .filter-generate-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .filter-generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .filter-cancel-btn {
      font-family: var(--sans); font-size: 0.82rem; font-weight: 500;
      padding: 0.5rem 1rem;
      background: var(--surface-raised); color: var(--text-muted);
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .filter-cancel-btn:hover { background: var(--surface-hover); color: var(--text); }

    .filter-status {
      font-family: var(--mono); font-size: 0.78rem; color: var(--text-muted);
    }

    .filter-status-success {
      color: var(--success);
      animation: filter-fade 4s ease forwards;
    }

    @keyframes filter-fade {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div>
          <div class="header-title">
            <h1>BOL Extractor</h1>
            <span class="badge">Phase 3.5</span>
          </div>
          <p class="subtitle">Search daily BOL reports for job numbers with document-aware deduplication.</p>
        </div>
        <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">
          <span class="theme-label-dark">Dark</span>
          <span class="theme-label-light">Light</span>
        </button>
      </div>
    </header>

    <section class="card" id="upload-section">
      <h2>Load PDF</h2>
      <div id="drop-zone">
        <span class="drop-icon">&#128196;</span>
        <p>Drag and drop a PDF here, or click to browse</p>
        <p class="drop-hint">Accepts .pdf files only</p>
        <input type="file" id="file-input" accept=".pdf" hidden>
      </div>
      <div id="progress-area" hidden>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p id="progress-text" class="progress-text">Extracting...</p>
      </div>
      <div id="file-info" hidden>
        <div class="file-info-content">
          <span class="file-name" id="file-name"></span>
          <span class="file-meta" id="file-meta"></span>
          <span class="file-meta" id="section-meta" hidden></span>
        </div>
        <button id="file-clear-btn" class="file-clear-btn" title="Clear file">&times;</button>
      </div>
    </section>

    <section class="card" id="search-section">
      <h2>Search</h2>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Enter job numbers separated by commas (up to 10)" maxlength="80" disabled>
        <button id="search-clear-btn" class="search-clear-btn" disabled>Clear</button>
        <button id="search-btn" disabled>Search</button>
      </div>
      <p class="hint">Enter 6-digit job numbers separated by commas (e.g., 159650, 159652, 159653).</p>
    </section>

    <div id="status-area"></div>

    <section class="card" id="results-section" hidden>
      <div class="results-header">
        <h2 id="results-title">Results</h2>
        <span class="match-count" id="match-count"></span>
      </div>
      <div id="results-body"></div>
    </section>
  </div>

  <script type="module">
    // --- State ---
    let pdfPages = null;
    let pdfjsLib = null;
    let documentSections = null;
    let useFallback = false;
    let clarificationState = {};
    let currentResults = null;
    let allJobNumbersCache = null;
    let filterSections = null;
    let originalPdfBuffer = null;
    let originalFileName = '';

    // --- DOM refs ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const progressArea = document.getElementById('progress-area');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const fileInfo = document.getElementById('file-info');
    const fileNameEl = document.getElementById('file-name');
    const fileMetaEl = document.getElementById('file-meta');
    const sectionMetaEl = document.getElementById('section-meta');
    const fileClearBtn = document.getElementById('file-clear-btn');
    const searchInput = document.getElementById('search-input');
    const searchClearBtn = document.getElementById('search-clear-btn');
    const searchBtn = document.getElementById('search-btn');
    const statusArea = document.getElementById('status-area');
    const resultsSection = document.getElementById('results-section');
    const resultsTitle = document.getElementById('results-title');
    const matchCountEl = document.getElementById('match-count');
    const resultsBody = document.getElementById('results-body');

    // --- Theme toggle ---
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('bol-theme', next);
    });

    // --- Utilities ---

    async function initPdfJs() {
      if (pdfjsLib) return;
      pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showStatus(message, type) {
      statusArea.innerHTML = '<div class="status-msg status-' + type + '">' + escapeHtml(message) + '</div>';
    }

    function clearStatus() { statusArea.innerHTML = ''; }

    function extractCommaNumbers(lineText) {
      const matches = lineText.match(/\b\d{1,3}(?:,\d{3})+(?:\.\d+)?\b/g);
      if (!matches) return [];
      return matches.map(s => {
        const value = parseInt(s.replace(/,/g, ''), 10);
        const isNegative = lineText.indexOf(s) > 0 && lineText[lineText.indexOf(s) - 1] === '-';
        return { raw: s, value, negative: isNegative };
      });
    }

    function sectionTypeLabel(type) {
      const map = { manifest: 'Manifest', sg360_bol: 'SG360 BOL', uniform_bol: 'Uniform BOL' };
      return map[type] || type;
    }

    function sourceBadgeClass(type) {
      const map = { manifest: 'source-badge-manifest', sg360_bol: 'source-badge-sg360', uniform_bol: 'source-badge-uniform' };
      return 'source-badge ' + (map[type] || '');
    }

    // --- Phase 3: Utility functions ---

    function editDistance(a, b) {
      const m = a.length, n = b.length;
      const dp = [];
      for (let i = 0; i <= m; i++) {
        dp[i] = [i];
        for (let j = 1; j <= n; j++) dp[i][j] = i === 0 ? j : 0;
      }
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = a[i - 1] === b[j - 1]
            ? dp[i - 1][j - 1]
            : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
        }
      }
      return dp[m][n];
    }

    function findSimilarJobs(searched, allJobs) {
      const results = [];
      for (const job of allJobs) {
        if (job === searched) continue;
        const dist = editDistance(searched, job);
        if (dist <= 2) {
          results.push({ job, distance: dist });
          continue;
        }
        if (searched.length === 6 && job.length === 6) {
          let shared = 0;
          for (let i = 0; i < 6; i++) { if (searched[i] === job[i]) shared++; }
          if (shared >= 5) results.push({ job, distance: dist });
        }
      }
      results.sort((a, b) => a.distance - b.distance);
      return results;
    }

    function collectAllJobNumbers() {
      if (allJobNumbersCache) return allJobNumbersCache;
      const jobs = new Set();
      for (const { lines } of pdfPages) {
        for (const line of lines) {
          const pattern = /(?:^|[\s,;|/\-#:])(\d{6})(?=[A-Za-z\s,;|/\-#:)]|$)/g;
          let m;
          while ((m = pattern.exec(line)) !== null) jobs.add(m[1]);
        }
      }
      allJobNumbersCache = [...jobs].sort();
      return allJobNumbersCache;
    }

    // --- Line-aware PDF extraction ---

    function buildLineText(items) {
      let text = '';
      for (let i = 0; i < items.length; i++) {
        if (i > 0) {
          const prevEnd = items[i - 1].transform[4] + (items[i - 1].width || 0);
          const gap = items[i].transform[4] - prevEnd;
          text += gap > 10 ? '  ' : ' ';
        }
        text += items[i].str;
      }
      return text;
    }

    async function extractPageLines(page) {
      const content = await page.getTextContent();
      const items = content.items.filter(item => item.str.trim().length > 0);
      if (items.length === 0) return [];
      const Y_TOLERANCE = 3;
      const sorted = [...items].sort((a, b) => b.transform[5] - a.transform[5]);
      const lineGroups = [];
      let currentLine = [sorted[0]];
      let currentY = sorted[0].transform[5];
      for (let i = 1; i < sorted.length; i++) {
        const item = sorted[i];
        const y = item.transform[5];
        if (Math.abs(y - currentY) <= Y_TOLERANCE) {
          currentLine.push(item);
        } else {
          lineGroups.push(currentLine);
          currentLine = [item];
          currentY = y;
        }
      }
      lineGroups.push(currentLine);
      return lineGroups.map(group => {
        group.sort((a, b) => a.transform[4] - b.transform[4]);
        return buildLineText(group);
      });
    }

    // --- Document classification ---

    function classifySections(pages) {
      const allLines = [];
      for (const { pageNum, lines } of pages) {
        for (let i = 0; i < lines.length; i++) {
          allLines.push({ pageNum, lineIdx: i, text: lines[i] });
        }
      }

      const sections = [];
      let current = null;

      for (let i = 0; i < allLines.length; i++) {
        const line = allLines[i];
        const upper = line.text.toUpperCase();
        let type = null;

        if (upper.includes('OUTGOING VEHICLE INSPECTION RECORD')) {
          type = 'vehicle_inspection';
        } else if (upper.includes('UNIFORM STRAIGHT BILL OF LADING')) {
          type = 'uniform_bol';
        } else if (upper.includes('SEGERDAHL GROUP MANIFEST')) {
          type = 'manifest';
        } else if (upper.includes('STRAIGHT BILL OF LADING')) {
          const lo = Math.max(0, i - 5);
          const hi = Math.min(allLines.length, i + 10);
          let hasOriginal = false, hasUniform = false;
          for (let j = lo; j < hi; j++) {
            const t = allLines[j].text.toUpperCase();
            if (t.includes('ORIGINAL')) hasOriginal = true;
            if (t.includes('UNIFORM')) hasUniform = true;
          }
          if (hasOriginal && !hasUniform) type = 'sg360_bol';
        }

        if (type) {
          if (current) sections.push(current);
          current = { type, startPage: line.pageNum, endPage: line.pageNum, lines: [], metadata: {} };
        }

        if (current) {
          current.lines.push(line);
          current.endPage = line.pageNum;
        }
      }

      if (current) sections.push(current);

      // Fix section end boundaries: each section ends one page before the next starts
      for (let i = 0; i < sections.length - 1; i++) {
        sections[i].endPage = sections[i + 1].startPage - 1;
      }

      for (const section of sections) {
        for (const line of section.lines) {
          if (!section.metadata.tripNumber) {
            const m = line.text.match(/(VMI_T_[\dO]{7})/i);
            if (m) section.metadata.tripNumber = m[1].toUpperCase().replace(/O/g, '0');
          }
          if (!section.metadata.manifestNumber) {
            const m = line.text.match(/(VMI_M_[\dO]{7})/i);
            if (m) section.metadata.manifestNumber = m[1].toUpperCase().replace(/O/g, '0');
          }
          if (!section.metadata.loadNumber) {
            const m = line.text.match(/Load\s*#?\s*(\d+)/i);
            if (m) section.metadata.loadNumber = m[1];
          }
        }
      }

      return sections;
    }

    // --- Section parsers ---

    function parseManifestSection(section, baseJob) {
      const pattern = new RegExp(
        '(?:^|[\\s,;|/\\-#:])(' + baseJob + '[A-Za-z0-9\\-]*)', 'gi'
      );
      let trackingMyJob = false;
      let pendingJobNumberLine = false;
      let total = null;
      let totalPage = null;
      let totalSource = null;
      let totalLineText = null;
      const entries = [];

      for (const line of section.lines) {
        const text = line.text;

        // Handle split-line "Job Number Total" (second part: "Total NNN")
        if (pendingJobNumberLine && trackingMyJob) {
          pendingJobNumberLine = false;
          if (/total/i.test(text)) {
            const qty = extractCommaNumbers(text);
            if (qty.length > 0) {
              total = qty[0].value;
              totalPage = line.pageNum;
              totalSource = 'Job Number Total';
              totalLineText = text;
              trackingMyJob = false;
              continue;
            }
          }
        }

        // Check if this line has our searched job
        pattern.lastIndex = 0;
        const jobMatch = pattern.exec(text);

        if (jobMatch) {
          trackingMyJob = true;
          const qty = extractCommaNumbers(text);
          if (qty.length > 0) {
            entries.push({
              page: line.pageNum, lineText: text,
              quantity: qty[0].value, raw: qty[0].raw, variant: jobMatch[1],
            });
          }
        } else {
          // Check if a different job's entry (has 6-digit number + quantities)
          const otherJob = text.match(/(?:^|[\s,;|/\-#:])(\d{6})/);
          if (otherJob && otherJob[1] !== baseJob && extractCommaNumbers(text).length > 0) {
            trackingMyJob = false;
          }
        }

        // Check for "Job Number Total" (flexible whitespace for OCR)
        if (/job\s+number\s+total/i.test(text) && trackingMyJob) {
          const qty = extractCommaNumbers(text);
          if (qty.length > 0) {
            total = qty[0].value;
            totalPage = line.pageNum;
            totalSource = 'Job Number Total';
            totalLineText = text;
          } else {
            const plain = text.match(/total\s+(\d+)/i);
            if (plain) {
              total = parseInt(plain[1], 10);
              totalPage = line.pageNum;
              totalSource = 'Job Number Total';
              totalLineText = text;
            }
          }
          trackingMyJob = false;
        } else if (/job\s+number\s*$/i.test(text) && trackingMyJob) {
          // Possible split-line: "Job Number" on this line, "Total NNN" on next
          pendingJobNumberLine = true;
        }
      }

      if (total === null && entries.length > 0) {
        total = entries.reduce((s, e) => s + e.quantity, 0);
        totalSource = 'Sum of ' + entries.length + ' pallet entries';
        totalPage = entries[0].page;
      }

      return { total: total || 0, totalSource, totalPage, totalLineText, entries };
    }

    function parseSG360Section(section, baseJob) {
      const pattern = new RegExp(
        '(?:^|[\\s,;|/\\-#:])(' + baseJob + '[A-Za-z0-9\\-]*)', 'gi'
      );
      const entries = [];

      for (const line of section.lines) {
        pattern.lastIndex = 0;
        const m = pattern.exec(line.text);
        if (!m) continue;
        const qty = extractCommaNumbers(line.text);
        if (qty.length === 0) continue;
        entries.push({
          page: line.pageNum, lineText: line.text,
          quantity: qty[0].value, raw: qty[0].raw, variant: m[1],
        });
      }

      const total = entries.reduce((s, e) => s + e.quantity, 0);
      return {
        total,
        totalSource: entries.length > 0 ? 'Sum of ' + entries.length + ' entries' : null,
        totalPage: entries.length > 0 ? entries[0].page : null,
        totalLineText: null,
        entries,
      };
    }

    function parseUniformSection(section, baseJob) {
      return parseSG360Section(section, baseJob);
    }

    // --- Deduplication ---

    function deduplicateJob(baseJob, sections) {
      if (!sections || sections.length === 0) {
        return { jobNumber: baseJob, deduplicatedTotal: 0, trips: [] };
      }

      const PRIORITY = { manifest: 3, sg360_bol: 2, uniform_bol: 1 };
      const findings = [];

      for (let si = 0; si < sections.length; si++) {
        const section = sections[si];
        if (section.type === 'vehicle_inspection') continue;

        let result;
        if (section.type === 'manifest') result = parseManifestSection(section, baseJob);
        else if (section.type === 'sg360_bol') result = parseSG360Section(section, baseJob);
        else if (section.type === 'uniform_bol') result = parseUniformSection(section, baseJob);

        if (result && (result.total > 0 || result.entries.length > 0)) {
          findings.push({
            sectionType: section.type,
            sectionIndex: si,
            tripNumber: section.metadata.tripNumber || null,
            total: result.total,
            totalSource: result.totalSource,
            totalPage: result.totalPage,
            totalLineText: result.totalLineText,
            entries: result.entries,
          });
        }
      }

      if (findings.length === 0) {
        return { jobNumber: baseJob, deduplicatedTotal: 0, trips: [] };
      }

      // Resolve null trip numbers by section proximity.
      // Uniform BOL sections lack VMI_T trip numbers. Link them to the
      // nearest section (preferring the next one forward) that has a trip,
      // since each Uniform BOL typically precedes its corresponding Manifest.
      for (const f of findings) {
        if (f.tripNumber) continue;
        let best = null;
        for (const other of findings) {
          if (!other.tripNumber || other.sectionIndex <= f.sectionIndex) continue;
          if (!best || other.sectionIndex < best.sectionIndex) best = other;
        }
        if (!best) {
          for (const other of findings) {
            if (!other.tripNumber || other.sectionIndex >= f.sectionIndex) continue;
            if (!best || other.sectionIndex > best.sectionIndex) best = other;
          }
        }
        if (best) f.tripNumber = best.tripNumber;
      }

      // Group by trip
      const tripGroups = new Map();
      for (const f of findings) {
        const key = f.tripNumber || 'unknown_' + f.sectionIndex;
        if (!tripGroups.has(key)) tripGroups.set(key, []);
        tripGroups.get(key).push(f);
      }

      const trips = [];
      let deduplicatedTotal = 0;

      for (const [tripKey, groupFindings] of tripGroups) {
        groupFindings.sort((a, b) => (PRIORITY[b.sectionType] || 0) - (PRIORITY[a.sectionType] || 0));
        const winner = groupFindings[0];
        const excluded = groupFindings.slice(1).map(f => ({
          sectionType: f.sectionType,
          total: f.total,
          reason: 'Duplicate of ' + sectionTypeLabel(winner.sectionType) + ' (same trip)',
          entries: f.entries,
        }));

        deduplicatedTotal += winner.total;
        trips.push({
          tripNumber: tripKey.startsWith('unknown_') ? null : tripKey,
          total: winner.total,
          source: winner.sectionType,
          sourceDetail: winner.totalSource,
          sourcePage: winner.totalPage,
          included: {
            sectionType: winner.sectionType,
            totalLineText: winner.totalLineText,
            entries: winner.entries,
          },
          excluded,
        });
      }

      return { jobNumber: baseJob, deduplicatedTotal, trips };
    }

    // --- Phase 3: Confidence scoring ---

    function assessConfidence(result) {
      const { jobNumber, deduplicatedTotal, trips } = result;
      if (trips.length === 0) return { level: 'high', reasons: [], clarifications: [] };

      const clarifications = [];

      for (let ti = 0; ti < trips.length; ti++) {
        const trip = trips[ti];

        // Source mismatch: winner vs excluded sources differ significantly
        for (const exc of trip.excluded) {
          if (exc.total === 0) continue;
          const diff = Math.abs(trip.total - exc.total);
          const threshold = Math.max(Math.max(trip.total, exc.total) * 0.01, 100);
          if (diff > threshold) {
            clarifications.push({
              type: 'source_mismatch',
              tripNumber: trip.tripNumber,
              currentSource: trip.source,
              currentTotal: trip.total,
              alternativeSource: exc.sectionType,
              alternativeTotal: exc.total,
              tripIndex: ti,
            });
          }
        }

        // No authoritative source: only Uniform BOL pallet entries
        if (trip.source === 'uniform_bol' && trip.included.entries.length > 0) {
          const entries = trip.included.entries;
          clarifications.push({
            type: 'no_authoritative',
            tripNumber: trip.tripNumber,
            total: trip.total,
            entryCount: entries.length,
            startPage: entries[0].page,
            endPage: entries[entries.length - 1].page,
            tripIndex: ti,
          });
        }
      }

      const level = clarifications.length > 0 ? 'flagged' : 'high';
      const reasons = [...new Set(clarifications.map(c => c.type))];
      return { level, reasons, clarifications };
    }

    function getClarifiedTotal(result) {
      let total = result.deduplicatedTotal;
      if (!result.confidence) return total;
      for (let ci = 0; ci < result.confidence.clarifications.length; ci++) {
        const clarId = result.jobNumber + '_' + ci;
        const state = clarificationState[clarId];
        if (!state || !state.resolved || !state.delta) continue;
        total += state.delta;
      }
      return Math.max(0, total);
    }

    // --- File handling ---

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
        handleFile(file);
      } else {
        showStatus('Please drop a valid PDF file.', 'warn');
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    async function handleFile(file) {
      clearStatus();
      resultsSection.hidden = true;

      try { await initPdfJs(); } catch {
        showStatus('Failed to load PDF.js library. Check your internet connection.', 'error');
        return;
      }

      dropZone.hidden = true;
      progressArea.hidden = false;
      progressFill.style.width = '0%';
      progressText.textContent = 'Loading PDF...';

      try {
        const arrayBuffer = await file.arrayBuffer();
        originalPdfBuffer = arrayBuffer.slice(0);
        originalFileName = file.name;
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;
        const pages = [];

        for (let i = 1; i <= totalPages; i++) {
          const page = await pdf.getPage(i);
          const lines = await extractPageLines(page);
          pages.push({ pageNum: i, lines });
          const pct = Math.round((i / totalPages) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = 'Extracting page ' + i + ' of ' + totalPages + '...';
          if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
        }

        pdfPages = pages;

        // Phase 2: classify sections
        progressText.textContent = 'Analyzing document structure...';
        await new Promise(r => setTimeout(r, 0));
        documentSections = classifySections(pdfPages);
        const dataSections = documentSections.filter(s => s.type !== 'vehicle_inspection');
        useFallback = dataSections.length === 0;

        progressArea.hidden = true;
        fileInfo.hidden = false;
        fileNameEl.textContent = file.name;
        fileMetaEl.textContent =
          totalPages + ' pages \u00b7 ' + (file.size / (1024 * 1024)).toFixed(2) + ' MB';

        if (!useFallback) {
          const counts = {};
          for (const s of dataSections) counts[s.type] = (counts[s.type] || 0) + 1;
          const parts = [];
          for (const [t, c] of Object.entries(counts)) parts.push(c + ' ' + sectionTypeLabel(t));
          sectionMetaEl.textContent = '\u00b7 ' + parts.join(', ');
          sectionMetaEl.hidden = false;
        } else {
          sectionMetaEl.hidden = true;
        }

        searchInput.disabled = false;
        searchClearBtn.disabled = false;
        searchBtn.disabled = false;
        searchInput.focus();
      } catch {
        progressArea.hidden = true;
        dropZone.hidden = false;
        showStatus('Failed to extract PDF text. The file may be corrupted or password-protected.', 'error');
      }
    }

    // --- Clear / Reset ---

    fileClearBtn.addEventListener('click', () => {
      pdfPages = null;
      documentSections = null;
      useFallback = false;
      clarificationState = {};
      currentResults = null;
      allJobNumbersCache = null;
      filterSections = null;
      originalPdfBuffer = null;
      originalFileName = '';
      fileInfo.hidden = true;
      sectionMetaEl.hidden = true;
      dropZone.hidden = false;
      searchInput.disabled = true;
      searchClearBtn.disabled = true;
      searchBtn.disabled = true;
      searchInput.value = '';
      fileInput.value = '';
      resultsSection.hidden = true;
      clearStatus();
    });

    searchClearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clarificationState = {};
      currentResults = null;
      filterSections = null;
      resultsSection.hidden = true;
      clearStatus();
      searchInput.focus();
    });

    // --- Event delegation ---

    resultsBody.addEventListener('click', (e) => {
      // Phase 3.5: Filter panel buttons
      if (e.target.closest('#filter-btn')) { showFilterPanel(); return; }
      if (e.target.closest('#filter-cancel-btn')) { hideFilterPanel(); return; }
      if (e.target.closest('#filter-generate-btn')) { generateFilteredPdf(); return; }

      // Phase 3: Clarification buttons
      const clarBtn = e.target.closest('.clarification-btn');
      if (clarBtn) {
        handleClarificationChoice(clarBtn);
        return;
      }

      // Phase 3: Suggestion links (zero-result)
      const sugLink = e.target.closest('.suggestion-link');
      if (sugLink) {
        const job = sugLink.dataset.job;
        if (job) { searchInput.value = job; performSearch(); }
        return;
      }

      // Expand/collapse
      const btn = e.target.closest('.expand-btn');
      if (!btn) return;
      const group = btn.closest('.job-group');
      const header = group.querySelector('.job-group-header');
      const detail = group.querySelector('.job-detail');
      if (!detail) return;

      const wasHidden = detail.hidden;
      detail.hidden = !wasHidden;

      // Phase 3: Handle clarification wrapper border when toggling detail
      const clarWrapper = group.querySelector('.clarification-wrapper');
      if (clarWrapper) {
        clarWrapper.classList.toggle('clarification-bottom', !wasHidden);
      } else {
        header.classList.toggle('collapsed', !wasHidden);
      }

      btn.textContent = wasHidden ? 'Hide' : 'Details';
    });

    // Phase 3.5: Filter checkbox changes
    resultsBody.addEventListener('change', (e) => {
      const cb = e.target.closest('.filter-section-cb');
      if (cb && filterSections) {
        const idx = parseInt(cb.dataset.filterIdx, 10);
        if (filterSections[idx] !== undefined) {
          filterSections[idx].checked = cb.checked;
          updateFilterSummary();
        }
      }
    });

    // --- Search ---

    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });

    function parseJobInput() {
      const rawEntries = searchInput.value.trim()
        .split(/[,\s]+/).map(s => s.trim()).filter(s => s.length > 0);
      const valid = [];
      const invalid = [];
      const seen = new Set();

      for (const entry of rawEntries) {
        const m = entry.match(/^(\d{6})/);
        if (m) {
          if (!seen.has(m[1])) { seen.add(m[1]); valid.push(m[1]); }
        } else if (/[a-zA-Z]/.test(entry)) {
          invalid.push({ entry, reason: 'Contains non-numeric characters \u2014 enter the 6-digit job number only' });
        } else {
          const digits = entry.replace(/\D/g, '');
          if (digits.length < 6) {
            invalid.push({ entry, reason: 'Only ' + digits.length + ' digit' + (digits.length !== 1 ? 's' : '') + ' \u2014 job numbers are 6 digits' });
          } else {
            invalid.push({ entry, reason: digits.length + ' digits \u2014 job numbers are 6 digits' });
          }
        }
      }

      if (valid.length === 0 && invalid.length === 0) { showStatus('Enter at least one valid 6-digit job number.', 'warn'); return null; }
      if (valid.length > 10) { showStatus('Maximum 10 valid job numbers at a time.', 'warn'); return null; }
      return { valid, invalid };
    }

    function scanJobRaw(baseJob) {
      const pattern = new RegExp('(?:^|[\\s,;|/\\-#:])(' + baseJob + '[A-Za-z0-9\\-]*)', 'gi');
      let matchCount = 0;
      const variants = new Set();
      const pagesWithMatches = new Set();
      const lineHits = new Map();
      for (const { pageNum, lines } of pdfPages) {
        for (let li = 0; li < lines.length; li++) {
          const line = lines[li];
          pattern.lastIndex = 0;
          let m;
          while ((m = pattern.exec(line)) !== null) {
            matchCount++;
            variants.add(m[1].toUpperCase());
            pagesWithMatches.add(pageNum);
            const key = pageNum + ':' + li;
            if (!lineHits.has(key)) {
              const commaNumbers = extractCommaNumbers(line);
              lineHits.set(key, {
                pageNum, lineText: line,
                primaryQty: commaNumbers.length > 0 ? commaNumbers[0] : null,
              });
            }
          }
        }
      }
      return {
        matchCount,
        lineHits: [...lineHits.values()],
        variants: [...variants].sort(),
        pages: [...pagesWithMatches].sort((a, b) => a - b),
      };
    }

    function performSearch() {
      clearStatus();
      resultsSection.hidden = true;
      if (!pdfPages) return;

      // Phase 3: Reset clarification state for each new search
      clarificationState = {};
      currentResults = null;
      filterSections = null;

      const parsed = parseJobInput();
      if (!parsed) return;
      const { valid: uniqueJobs, invalid: invalidEntries } = parsed;

      // If only invalid entries and no valid jobs, render just the skipped cards
      if (uniqueJobs.length === 0) {
        renderPhase2Results([], invalidEntries);
        return;
      }

      if (useFallback) {
        // Phase 1 fallback
        const allResults = [];
        let totalMatches = 0;
        for (const baseJob of uniqueJobs) {
          const raw = scanJobRaw(baseJob);
          totalMatches += raw.matchCount;
          allResults.push({ baseJob, ...raw });
        }
        renderFallbackResults(allResults, totalMatches, invalidEntries);
        return;
      }

      // Phase 2+3: deduplicated search with confidence scoring
      const allResults = [];
      for (const baseJob of uniqueJobs) {
        const dedup = deduplicateJob(baseJob, documentSections);
        const raw = scanJobRaw(baseJob);
        allResults.push({ ...dedup, raw });
      }
      currentResults = allResults;
      renderPhase2Results(allResults, invalidEntries);
    }

    // --- Display helpers ---

    function truncateLine(line, baseJob) {
      if (line.length <= 200) return { text: line, pre: false, post: false };
      const idx = line.search(new RegExp(baseJob, 'i'));
      if (idx === -1) return { text: line.substring(0, 200), pre: false, post: true };
      let start = Math.max(0, idx - 100);
      let end = start + 200;
      if (end > line.length) { end = line.length; start = Math.max(0, end - 200); }
      return { text: line.substring(start, end), pre: start > 0, post: end < line.length };
    }

    function highlightInLine(text, baseJob) {
      const pattern = new RegExp('(?:^|[\\s,;|/\\-#:])(' + baseJob + '[A-Za-z0-9\\-]*)', 'gi');
      const spans = [];
      let m;
      while ((m = pattern.exec(text)) !== null) {
        const s = m.index + m[0].length - m[1].length;
        spans.push({ start: s, end: m.index + m[0].length });
      }
      if (spans.length === 0) return escapeHtml(text);
      let html = '', pos = 0;
      for (const s of spans) {
        html += escapeHtml(text.substring(pos, s.start));
        html += '<mark>' + escapeHtml(text.substring(s.start, s.end)) + '</mark>';
        pos = s.end;
      }
      html += escapeHtml(text.substring(pos));
      return html;
    }

    function getSourceSummary(trips) {
      const counts = {};
      for (const t of trips) {
        const label = sectionTypeLabel(t.source);
        counts[label] = (counts[label] || 0) + 1;
      }
      const parts = [];
      for (const [label, c] of Object.entries(counts)) {
        parts.push(c > 1 ? c + ' ' + label + ' totals' : label + ' total');
      }
      return parts.length > 0 ? 'From ' + parts.join(' + ') : '';
    }

    function getDedupNote(trip) {
      const srcLabel = sectionTypeLabel(trip.source);
      let note = srcLabel;
      if (trip.sourceDetail === 'Job Number Total') {
        note += ' Job Number Total (' + trip.total.toLocaleString() + ' on page ' + trip.sourcePage + ') used as authoritative source.';
      } else if (trip.sourceDetail) {
        note += ' (' + trip.total.toLocaleString() + ') used.';
      }
      if (trip.excluded.length > 0) {
        const types = [...new Set(trip.excluded.map(e => sectionTypeLabel(e.sectionType)))];
        note += ' ' + types.join(', ') + ' entries excluded as duplicate.';
      }
      return note;
    }

    function renderEntryLine(entry, baseJob, extraClass, trailingHtml) {
      const { text, pre, post } = truncateLine(entry.lineText, baseJob);
      const highlighted = highlightInLine(text, baseJob);
      return '<div class="result-item' + (extraClass ? ' ' + extraClass : '') + '">' +
        '<span class="page-badge">p.' + entry.page + '</span>' +
        '<span class="result-context">' + (pre ? '\u2026' : '') + highlighted + (post ? '\u2026' : '') + '</span>' +
        (entry.raw ? '<span class="result-qty">' + escapeHtml(entry.raw) + '</span>' : '') +
        (trailingHtml || '') + '</div>';
    }

    // --- Phase 3: Render helpers ---

    function renderClarificationArea(clar, jobNumber, clarId) {
      let html = '<div class="clarification-area" data-clar-id="' + escapeHtml(clarId) + '">';

      if (clar.type === 'source_mismatch') {
        const tripLabel = clar.tripNumber ? 'Trip ' + clar.tripNumber : 'Unknown trip';
        const curLabel = sectionTypeLabel(clar.currentSource);
        const altLabel = sectionTypeLabel(clar.alternativeSource);
        html += '<div class="clarification-title">\u26A0 Quantity mismatch for job ' + escapeHtml(jobNumber) + '</div>';
        html += '<div class="clarification-desc">The ' + curLabel + ' total (' + tripLabel +
          ') shows ' + clar.currentTotal.toLocaleString() + ' pieces, but the ' + altLabel +
          ' summary shows ' + clar.alternativeTotal.toLocaleString() + ' pieces.</div>';
        html += '<div class="clarification-current">Currently using: ' + curLabel +
          ' total (' + clar.currentTotal.toLocaleString() + ')</div>';
        html += '<div class="clarification-actions">' +
          '<button class="clarification-btn clarification-btn-primary" ' +
          'data-clar-id="' + escapeHtml(clarId) + '" data-choice="keep" data-job="' + escapeHtml(jobNumber) + '" ' +
          'data-current-total="' + clar.currentTotal + '" data-source-label="' + curLabel + '">' +
          'Keep ' + curLabel + ' Total</button>' +
          '<button class="clarification-btn" ' +
          'data-clar-id="' + escapeHtml(clarId) + '" data-choice="alternative" data-job="' + escapeHtml(jobNumber) + '" ' +
          'data-new-total="' + clar.alternativeTotal + '" data-current-total="' + clar.currentTotal + '" ' +
          'data-source-label="' + altLabel + '">' +
          'Use ' + altLabel + ' Total</button></div>';

      } else if (clar.type === 'no_authoritative') {
        const pageRange = clar.startPage === clar.endPage
          ? 'page ' + clar.startPage
          : 'pages ' + clar.startPage + '\u2013' + clar.endPage;
        html += '<div class="clarification-title">\u26A0 No Manifest or SG360 BOL total found for job ' +
          escapeHtml(jobNumber) + '</div>';
        html += '<div class="clarification-desc">The total (' + clar.total.toLocaleString() +
          ') is based on summing ' + clar.entryCount + ' individual pallet entries from the Uniform BOL on ' +
          pageRange + '. This is less reliable than a Manifest or SG360 BOL total.</div>';
        html += '<div class="clarification-actions">' +
          '<button class="clarification-btn clarification-btn-primary" ' +
          'data-clar-id="' + escapeHtml(clarId) + '" data-choice="acknowledge" data-job="' + escapeHtml(jobNumber) + '" ' +
          'data-current-total="' + clar.total + '" data-source-label="Uniform BOL">' +
          'OK, Use Pallet Sum</button></div>';
      }

      html += '</div>';
      return html;
    }

    function renderVariantBreakdown(result) {
      const variants = {};
      for (const trip of result.trips) {
        for (const entry of trip.included.entries) {
          const v = (entry.variant || result.jobNumber).toUpperCase();
          if (!variants[v]) variants[v] = { total: 0, trips: new Set() };
          variants[v].total += entry.quantity;
          variants[v].trips.add(trip.tripNumber || 'Unknown');
        }
      }
      const keys = Object.keys(variants).sort();
      if (keys.length <= 1) return '';

      let html = '<div class="variant-summary">';
      html += '<div class="variant-summary-title">Variant Breakdown</div>';
      for (const v of keys) {
        const d = variants[v];
        const tc = d.trips.size;
        html += '<div class="variant-row">' +
          '<span class="variant-name">' + escapeHtml(v) + '</span>' +
          '<span class="variant-detail">' + tc + ' trip' + (tc !== 1 ? 's' : '') + '</span>' +
          '<span class="variant-total">' + d.total.toLocaleString() + '</span></div>';
      }
      html += '</div>';
      return html;
    }

    function renderZeroResultBody(jobNumber) {
      const allJobs = collectAllJobNumbers();
      const similar = findSimilarJobs(jobNumber, allJobs);

      let html = '<div class="zero-result-body">';
      html += '<p>Job ' + escapeHtml(jobNumber) + ' was not found in this BOL report.</p>';
      html += '<p>This report contains ' + allJobs.length + ' unique job numbers.</p>';

      if (similar.length > 0) {
        html += '<p>Similar numbers found: ' +
          similar.slice(0, 5).map(function(s) {
            return '<span class="suggestion-link" data-job="' + escapeHtml(s.job) + '">' + escapeHtml(s.job) + '</span>';
          }).join(', ') + '</p>';
      } else {
        html += '<p>No similar job numbers were found.</p>';
      }

      html += '</div>';
      return html;
    }

    function handleClarificationChoice(btn) {
      const clarId = btn.dataset.clarId;
      const choice = btn.dataset.choice;
      const jobNumber = btn.dataset.job;
      const area = document.querySelector('[data-clar-id="' + clarId + '"]');
      if (!area) return;

      let delta = 0;
      let message = '';

      if (choice === 'keep') {
        const total = parseInt(btn.dataset.currentTotal, 10);
        message = 'Got it \u2014 using ' + btn.dataset.sourceLabel + ' total of ' + total.toLocaleString() + '.';
      } else if (choice === 'alternative') {
        const newTotal = parseInt(btn.dataset.newTotal, 10);
        const curTotal = parseInt(btn.dataset.currentTotal, 10);
        delta = newTotal - curTotal;
        message = 'Updated \u2014 now using ' + btn.dataset.sourceLabel + ' total of ' +
          newTotal.toLocaleString() + '. Previous: ' + curTotal.toLocaleString() + '.';
      } else if (choice === 'acknowledge') {
        const total = parseInt(btn.dataset.currentTotal, 10);
        message = 'Acknowledged \u2014 using pallet entry sum of ' + total.toLocaleString() + '.';
      }

      clarificationState[clarId] = { resolved: true, choice, delta };

      // Animate transition
      area.style.opacity = '0';
      setTimeout(function() {
        area.textContent = message;
        area.classList.remove('clarification-area');
        area.classList.add('clarification-resolved');
        area.style.opacity = '';

        if (delta !== 0) updateDisplayTotals(jobNumber);
      }, 250);
    }

    function updateDisplayTotals(jobNumber) {
      if (!currentResults) return;
      const result = currentResults.find(function(r) { return r.jobNumber === jobNumber; });
      if (!result) return;

      const newTotal = getClarifiedTotal(result);

      // Update job total with highlight
      const jobEl = document.getElementById('job-total-' + jobNumber);
      if (jobEl) {
        jobEl.textContent = newTotal.toLocaleString() + ' pcs';
        jobEl.classList.remove('number-updated');
        void jobEl.offsetWidth; // force reflow for re-trigger
        jobEl.classList.add('number-updated');
      }

      // Update grand total with highlight
      if (currentResults.length >= 2) {
        const grandEl = document.getElementById('grand-total-value');
        if (grandEl) {
          const grand = currentResults.reduce(function(s, r) { return s + getClarifiedTotal(r); }, 0);
          grandEl.textContent = grand.toLocaleString() + ' pcs';
          grandEl.classList.remove('number-updated');
          void grandEl.offsetWidth;
          grandEl.classList.add('number-updated');
        }
      }
    }

    // --- Render: Phase 2 ---

    function renderPhase2Results(allResults, invalidEntries) {
      invalidEntries = invalidEntries || [];
      resultsSection.hidden = false;
      resultsTitle.textContent = 'Results';

      // Phase 3: Assess confidence for each result
      for (const result of allResults) {
        result.confidence = assessConfidence(result);
      }

      const jobsWithData = allResults.filter(r => r.deduplicatedTotal > 0);
      const flaggedCount = allResults.filter(r => r.confidence.level === 'flagged').length;
      let statusParts = allResults.length + ' job' + (allResults.length !== 1 ? 's' : '');
      if (jobsWithData.length > 0) statusParts += ' \u00b7 deduplicated';
      if (flaggedCount > 0) statusParts += ' \u00b7 ' + flaggedCount + ' flagged';
      matchCountEl.textContent = statusParts;

      let html = '';

      // Grand total for 2+ jobs
      if (allResults.length >= 2) {
        const grandTotal = allResults.reduce(function(s, r) { return s + getClarifiedTotal(r); }, 0);
        if (grandTotal > 0) {
          html += '<div class="grand-total" id="grand-total-bar">Total across ' + allResults.length +
            ' jobs: <strong id="grand-total-value">' + grandTotal.toLocaleString() + ' pcs</strong></div>';
        }
      }

      // Phase 3.5: Filter PDF button
      if (jobsWithData.length > 0) {
        html += '<div id="filter-area"><button class="filter-btn" id="filter-btn">Filter PDF</button></div>';
      }

      for (const result of allResults) {
        const { jobNumber, deduplicatedTotal, trips, raw, confidence } = result;
        const isFlagged = confidence.level === 'flagged';
        const isNotFound = trips.length === 0;
        const variantCount = raw.variants.length;

        const groupClass = 'job-group' +
          (isFlagged ? ' job-group-flagged' : '') +
          (isNotFound ? ' job-group-not-found' : '');
        html += '<div class="' + groupClass + '" data-job="' + escapeHtml(jobNumber) + '">';

        if (isNotFound) {
          // Zero-result card
          html += '<div class="job-group-header collapsed">' +
            '<span class="job-group-number">' + escapeHtml(jobNumber) + '</span>' +
            '<span class="not-found-badge">Not Found</span></div>';
          html += renderZeroResultBody(jobNumber);

        } else {
          // Has data — build header
          const displayTotal = getClarifiedTotal(result);
          const srcSummary = getSourceSummary(trips);
          const tripLabel = trips.length + ' trip' + (trips.length !== 1 ? 's' : '');
          const hasClarifications = isFlagged && confidence.clarifications.length > 0;

          // Header: not collapsed when clarification wrapper follows
          html += '<div class="job-group-header' + (hasClarifications ? '' : ' collapsed') + '">' +
            '<span class="job-group-number">' + escapeHtml(jobNumber) + '</span>';
          if (displayTotal > 0) {
            html += '<span class="job-group-total" id="job-total-' + escapeHtml(jobNumber) + '">' +
              displayTotal.toLocaleString() + ' pcs</span>';
          }
          if (variantCount > 1) {
            html += '<span class="job-group-source">' + variantCount + ' variants combined</span>';
          } else if (srcSummary) {
            html += '<span class="job-group-source">' + escapeHtml(srcSummary) + '</span>';
          }
          html += '<span class="job-group-meta">' + tripLabel + '</span>' +
            '<button class="expand-btn">Details</button></div>';

          // Clarification wrapper (for flagged jobs)
          if (hasClarifications) {
            html += '<div class="clarification-wrapper clarification-bottom">';
            for (let ci = 0; ci < confidence.clarifications.length; ci++) {
              html += renderClarificationArea(confidence.clarifications[ci], jobNumber, jobNumber + '_' + ci);
            }
            html += '</div>';
          }

          // Variant info row (when variants exist and no clarification wrapper)
          if (variantCount > 1 && !hasClarifications) {
            html += '<div class="job-group-variants">Variants: ' +
              raw.variants.map(function(v) { return escapeHtml(v); }).join(', ') + '</div>';
          }

          // Detail panel (hidden by default)
          html += '<div class="job-detail" hidden>';

          // Variant breakdown in detail panel
          if (variantCount > 1) {
            html += renderVariantBreakdown(result);
          }

          for (const trip of trips) {
            html += '<div class="trip-group">';

            // Trip header
            html += '<div class="trip-header">';
            html += '<span class="trip-id">' + (trip.tripNumber || 'Unknown trip') + '</span>';
            html += '<span class="' + sourceBadgeClass(trip.source) + '">' + sectionTypeLabel(trip.source) + '</span>';
            html += '<span class="trip-total">' + trip.total.toLocaleString() + '</span>';
            html += '</div>';

            // Dedup note
            const note = getDedupNote(trip);
            if (note) html += '<div class="dedup-note">' + escapeHtml(note) + '</div>';

            // Included entries
            if (trip.included.totalLineText) {
              html += renderEntryLine(
                { page: trip.sourcePage, lineText: trip.included.totalLineText, raw: trip.total.toLocaleString() },
                jobNumber, '', ''
              );
            }
            for (const entry of trip.included.entries) {
              html += renderEntryLine(entry, jobNumber, '', '');
            }

            // Excluded entries
            for (const exc of trip.excluded) {
              for (const entry of exc.entries) {
                html += renderEntryLine(entry, jobNumber, 'excluded',
                  '<span class="excluded-label">Duplicate</span>');
              }
            }

            html += '</div>'; // trip-group
          }
          html += '</div>'; // job-detail
        }

        html += '</div>'; // job-group
      }

      // Invalid entry cards (after all valid results)
      for (const inv of invalidEntries) {
        html += '<div class="job-group job-group-not-found">' +
          '<div class="job-group-header collapsed">' +
          '<span class="job-group-number">' + escapeHtml(inv.entry) + '</span>' +
          '<span class="not-found-badge">Skipped</span>' +
          '<span class="job-group-meta">' + escapeHtml(inv.reason) + '</span></div></div>';
      }

      resultsBody.innerHTML = html;
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // --- Render: Phase 1 fallback ---

    function renderFallbackResults(allResults, totalMatches, invalidEntries) {
      invalidEntries = invalidEntries || [];
      resultsSection.hidden = false;
      resultsTitle.textContent = 'Results';
      matchCountEl.textContent =
        totalMatches + ' match' + (totalMatches !== 1 ? 'es' : '') +
        ' across ' + allResults.length + ' job' + (allResults.length !== 1 ? 's' : '');

      const jobMaxQtys = allResults.map(({ lineHits }) => {
        const v = lineHits.filter(h => h.primaryQty).map(h => h.primaryQty.value);
        return v.length > 0 ? Math.max(...v) : 0;
      });

      let html = '<div class="fallback-warn">Could not identify document sections. Showing raw search results.</div>';

      if (allResults.length >= 2) {
        const grandTotal = jobMaxQtys.reduce((a, b) => a + b, 0);
        if (grandTotal > 0) {
          html += '<div class="grand-total">Total across ' + allResults.length +
            ' jobs: <strong>' + grandTotal.toLocaleString() + ' pcs</strong></div>';
        }
      }

      for (let ji = 0; ji < allResults.length; ji++) {
        const { baseJob, matchCount, lineHits, variants, pages } = allResults[ji];
        const maxQty = jobMaxQtys[ji];
        html += '<div class="job-group">';

        html += '<div class="job-group-header">';
        html += '<span class="job-group-number">' + escapeHtml(baseJob) + '</span>';
        if (maxQty > 0) html += '<span class="job-group-total">' + maxQty.toLocaleString() + ' pcs</span>';
        if (matchCount > 0) {
          html += '<span class="job-group-meta">' + matchCount + ' match' + (matchCount !== 1 ? 'es' : '') +
            ' on page' + (pages.length !== 1 ? 's' : '') + ' ' + pages.join(', ') + '</span>';
        } else {
          html += '<span class="job-group-meta">no matches</span>';
        }
        html += '</div>';

        if (variants.length > 1) {
          html += '<div class="job-group-variants">Variants: ' +
            variants.map(v => escapeHtml(v)).join(', ') + '</div>';
        }

        if (matchCount > 0) {
          html += '<div class="job-group-results">';
          for (const hit of lineHits) {
            const { text, pre, post } = truncateLine(hit.lineText, baseJob);
            const highlighted = highlightInLine(text, baseJob);
            html += '<div class="result-item">' +
              '<span class="page-badge">p.' + hit.pageNum + '</span>' +
              '<span class="result-context">' + (pre ? '\u2026' : '') + highlighted + (post ? '\u2026' : '') + '</span>';
            if (hit.primaryQty) html += '<span class="result-qty">' + escapeHtml(hit.primaryQty.raw) + '</span>';
            html += '</div>';
          }
          html += '</div>';
        } else {
          html += '<div class="job-group-no-results">No occurrences found in this document.</div>';
        }

        html += '</div>';
      }

      // Invalid entry cards
      for (const inv of invalidEntries) {
        html += '<div class="job-group job-group-not-found">' +
          '<div class="job-group-header collapsed">' +
          '<span class="job-group-number">' + escapeHtml(inv.entry) + '</span>' +
          '<span class="not-found-badge">Skipped</span>' +
          '<span class="job-group-meta">' + escapeHtml(inv.reason) + '</span></div></div>';
      }

      resultsBody.innerHTML = html;
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // --- Phase 3.5: PDF Filter ---

    function buildFilterableSections() {
      if (!currentResults || !documentSections) return [];
      const filterable = [];
      const jobsWithData = currentResults.filter(function(r) { return r.trips && r.trips.length > 0; });

      for (let si = 0; si < documentSections.length; si++) {
        const section = documentSections[si];
        if (section.type === 'vehicle_inspection') continue;

        const jobsInSection = [];

        for (const result of jobsWithData) {
          let parsed;
          if (section.type === 'manifest') parsed = parseManifestSection(section, result.jobNumber);
          else if (section.type === 'sg360_bol') parsed = parseSG360Section(section, result.jobNumber);
          else if (section.type === 'uniform_bol') parsed = parseUniformSection(section, result.jobNumber);

          if (parsed && (parsed.total > 0 || parsed.entries.length > 0)) {
            jobsInSection.push(result.jobNumber);
          }
        }

        if (jobsInSection.length > 0) {
          filterable.push({
            sectionIndex: si,
            type: section.type,
            startPage: section.startPage,
            endPage: section.endPage,
            metadata: section.metadata,
            jobs: jobsInSection,
            checked: true,
          });
        }
      }

      return filterable;
    }

    function getFilteredPageCount() {
      if (!filterSections) return 0;
      const pages = new Set();
      for (const s of filterSections) {
        if (!s.checked) continue;
        for (let p = s.startPage; p <= s.endPage; p++) pages.add(p);
      }
      return pages.size;
    }

    function updateFilterSummary() {
      const countEl = document.getElementById('filter-page-count');
      const genBtn = document.getElementById('filter-generate-btn');
      const emptyHint = document.getElementById('filter-empty-hint');
      if (!countEl || !genBtn) return;

      const totalPages = pdfPages ? pdfPages.length : 0;
      const filteredPages = getFilteredPageCount();
      const anyChecked = filterSections && filterSections.some(function(s) { return s.checked; });

      countEl.textContent = 'Reducing ' + totalPages + ' pages to ' + filteredPages + ' pages';
      genBtn.disabled = !anyChecked;
      if (emptyHint) emptyHint.hidden = anyChecked;
    }

    function showFilterPanel() {
      if (typeof PDFLib === 'undefined') {
        showStatus('PDF filtering is unavailable \u2014 the required library could not be loaded. Check your internet connection and reload the page.', 'error');
        return;
      }

      const area = document.getElementById('filter-area');
      if (!area) return;

      filterSections = buildFilterableSections();
      if (filterSections.length === 0) return;

      const totalPages = pdfPages ? pdfPages.length : 0;
      const filteredPages = getFilteredPageCount();

      let html = '<div class="filter-panel" id="filter-panel">';
      html += '<div class="filter-panel-title">Filter PDF</div>';
      html += '<div class="filter-panel-subtitle" id="filter-page-count">Reducing ' +
        totalPages + ' pages to ' + filteredPages + ' pages</div>';
      html += '<div class="filter-panel-desc">The following document sections contain your searched jobs and will be kept:</div>';

      html += '<div class="filter-sections-list">';
      for (let i = 0; i < filterSections.length; i++) {
        const s = filterSections[i];
        const pageLabel = s.startPage === s.endPage
          ? 'Page ' + s.startPage
          : 'Pages ' + s.startPage + '\u2013' + s.endPage;
        const typeLabel = sectionTypeLabel(s.type);
        const idLabel = s.metadata.manifestNumber || s.metadata.tripNumber || '';

        html += '<div class="filter-section-item">';
        html += '<input type="checkbox" class="filter-section-cb" data-filter-idx="' + i + '" checked>';
        html += '<div class="filter-section-info">';
        html += '<div class="filter-section-pages">' + escapeHtml(pageLabel) +
          ' \u2014 ' + escapeHtml(typeLabel) + (idLabel ? ' ' + escapeHtml(idLabel) : '') + '</div>';
        html += '<div class="filter-section-jobs">Jobs: ' + s.jobs.map(escapeHtml).join(', ') + '</div>';
        html += '</div></div>';
      }
      html += '</div>';

      html += '<div class="filter-numbering">';
      html += '<div class="filter-numbering-label">Page numbering in output PDF:</div>';
      html += '<label class="filter-radio"><input type="radio" name="filter-numbering" value="original">' +
        ' Keep original page numbers (e.g., 8, 9, 10, 24, 25\u2026)</label>';
      html += '<label class="filter-radio"><input type="radio" name="filter-numbering" value="sequential" checked>' +
        ' Renumber sequentially (1, 2, 3, 4\u2026)</label>';
      html += '</div>';

      html += '<div id="filter-empty-hint" class="filter-panel-desc" ' +
        'style="color: var(--warn); margin-top: 0.75rem;" hidden>' +
        'Select at least one section to generate a PDF.</div>';

      html += '<div class="filter-actions">';
      html += '<button class="filter-generate-btn" id="filter-generate-btn">Generate Filtered PDF</button>';
      html += '<button class="filter-cancel-btn" id="filter-cancel-btn">Cancel</button>';
      html += '<span class="filter-status" id="filter-status"></span>';
      html += '</div>';

      html += '</div>';

      area.innerHTML = html;
    }

    function hideFilterPanel() {
      const area = document.getElementById('filter-area');
      if (!area) return;
      filterSections = null;
