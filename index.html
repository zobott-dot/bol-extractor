<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOL Extractor</title>
  <script>
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('bol-theme') || 'dark'
    );
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    [hidden] { display: none !important; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222632;
      --surface-raised: #252a38;
      --border: #2e3348;
      --border-focus: #5b8af0;
      --text: #e2e4eb;
      --text-muted: #8b90a5;
      --text-dim: #5c6178;
      --accent: #5b8af0;
      --accent-soft: rgba(91, 138, 240, 0.12);
      --accent-hover: #7ba3f7;
      --success: #4ade80;
      --success-soft: rgba(74, 222, 128, 0.1);
      --warn: #f0a45b;
      --warn-soft: rgba(240, 164, 91, 0.1);
      --error: #f07070;
      --error-soft: rgba(240, 112, 112, 0.1);
      --sans: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --radius: 8px;
      --radius-lg: 12px;
    }

    [data-theme="light"] {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-hover: #f0f1f4;
      --surface-raised: #e8eaef;
      --border: #d1d5e0;
      --border-focus: #4a7ae5;
      --text: #1a1d27;
      --text-muted: #5c6178;
      --text-dim: #8b90a5;
      --accent: #4a7ae5;
      --accent-soft: rgba(74, 122, 229, 0.1);
      --accent-hover: #3a68d4;
      --success: #16a34a;
      --success-soft: rgba(22, 163, 74, 0.08);
      --warn: #d97706;
      --warn-soft: rgba(217, 119, 6, 0.08);
      --error: #dc2626;
      --error-soft: rgba(220, 38, 38, 0.07);
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    header {
      margin-bottom: 32px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
    }

    .theme-toggle {
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .theme-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    [data-theme="dark"] .theme-label-light { display: none; }
    [data-theme="dark"] .theme-label-dark { display: inline; }
    [data-theme="light"] .theme-label-dark { display: none; }
    [data-theme="light"] .theme-label-light { display: inline; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .drop-icon {
      display: block;
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.7;
    }

    #drop-zone p {
      color: var(--text-muted);
      font-size: 14px;
    }

    #drop-zone .drop-hint {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 4px;
    }

    #progress-area {
      padding: 16px 0 0;
    }

    .progress-bar {
      height: 4px;
      background: var(--surface-raised);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.15s ease;
    }

    .progress-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    #file-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--success-soft);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    .file-info-content {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .file-name {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--success);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .file-clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.3rem;
      padding: 0.5rem;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .file-clear-btn:hover {
      color: var(--error);
      background: var(--error-soft);
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    #search-input {
      flex: 1;
      font-family: var(--mono);
      font-size: 14px;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    #search-input:focus {
      border-color: var(--border-focus);
    }

    #search-input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #search-input::placeholder {
      color: var(--text-dim);
    }

    #search-btn {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #search-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    #search-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .search-clear-btn {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      background: var(--surface-raised);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .search-clear-btn:hover:not(:disabled) {
      background: var(--surface-hover);
      color: var(--text);
    }

    .search-clear-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 10px;
    }

    #status-area:empty {
      display: none;
    }

    .status-msg {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .status-error {
      background: var(--error-soft);
      border: 1px solid rgba(240, 112, 112, 0.2);
      color: var(--error);
    }

    .status-warn {
      background: var(--warn-soft);
      border: 1px solid rgba(240, 164, 91, 0.2);
      color: var(--warn);
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-header h2 {
      margin-bottom: 0;
    }

    .match-count {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
    }

    .grand-total {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 0.65rem 1rem;
      background: var(--surface-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.25rem;
    }

    .grand-total strong {
      color: var(--text);
      font-weight: 600;
    }

    .job-group {
      margin-bottom: 1.25rem;
    }

    .job-group:last-child {
      margin-bottom: 0;
    }

    .job-group-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      padding: 0.6rem 0.85rem;
      background: var(--surface-raised);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .job-group-number {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .job-group-total {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--success);
    }

    .job-group-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-left: auto;
    }

    .job-group-variants {
      font-size: 0.72rem;
      color: var(--text-dim);
      padding: 0.3rem 0.85rem;
      background: var(--surface-raised);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .job-group-results {
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--bg);
      max-height: 300px;
      overflow-y: auto;
    }

    .job-group-results::-webkit-scrollbar {
      width: 6px;
    }

    .job-group-results::-webkit-scrollbar-track {
      background: transparent;
    }

    .job-group-results::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .job-group-results::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    .job-group-no-results {
      padding: 0.75rem 0.85rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-style: italic;
      text-align: center;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      background: var(--bg);
    }

    .result-item {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.65rem 0.85rem;
      border-radius: 4px;
      transition: background 0.1s;
    }

    .result-item:hover {
      background: var(--surface-hover);
    }

    .page-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--surface-raised);
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      min-width: 44px;
      text-align: center;
      flex-shrink: 0;
    }

    .result-context {
      flex: 1;
      min-width: 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      overflow-wrap: break-word;
    }

    .result-context mark {
      background: rgba(91, 138, 240, 0.25);
      color: var(--accent-hover);
      padding: 1px 3px;
      border-radius: 3px;
      font-weight: 500;
    }

    .result-qty {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 5rem;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-row">
        <div>
          <div class="header-title">
            <h1>BOL Extractor</h1>
            <span class="badge">Phase 1</span>
          </div>
          <p class="subtitle">Search daily BOL reports for job numbers and view raw matches.</p>
        </div>
        <button id="theme-toggle" class="theme-toggle" title="Toggle light/dark mode">
          <span class="theme-label-dark">Dark</span>
          <span class="theme-label-light">Light</span>
        </button>
      </div>
    </header>

    <section class="card" id="upload-section">
      <h2>Load PDF</h2>
      <div id="drop-zone">
        <span class="drop-icon">&#128196;</span>
        <p>Drag and drop a PDF here, or click to browse</p>
        <p class="drop-hint">Accepts .pdf files only</p>
        <input type="file" id="file-input" accept=".pdf" hidden>
      </div>
      <div id="progress-area" hidden>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p id="progress-text" class="progress-text">Extracting...</p>
      </div>
      <div id="file-info" hidden>
        <div class="file-info-content">
          <span class="file-name" id="file-name"></span>
          <span class="file-meta" id="file-meta"></span>
        </div>
        <button id="file-clear-btn" class="file-clear-btn" title="Clear file">&times;</button>
      </div>
    </section>

    <section class="card" id="search-section">
      <h2>Search</h2>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="Enter job numbers separated by commas (up to 10)" maxlength="80" disabled>
        <button id="search-clear-btn" class="search-clear-btn" disabled>Clear</button>
        <button id="search-btn" disabled>Search</button>
      </div>
      <p class="hint">Enter 6-digit job numbers separated by commas (e.g., 159650, 159652, 159653).</p>
    </section>

    <div id="status-area"></div>

    <section class="card" id="results-section" hidden>
      <div class="results-header">
        <h2 id="results-title">Results</h2>
        <span class="match-count" id="match-count"></span>
      </div>
      <div id="results-body"></div>
    </section>
  </div>

  <script type="module">
    // --- State ---
    let pdfPages = null;
    let pdfjsLib = null;

    // --- DOM refs ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const progressArea = document.getElementById('progress-area');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const fileInfo = document.getElementById('file-info');
    const fileNameEl = document.getElementById('file-name');
    const fileMetaEl = document.getElementById('file-meta');
    const fileClearBtn = document.getElementById('file-clear-btn');
    const searchInput = document.getElementById('search-input');
    const searchClearBtn = document.getElementById('search-clear-btn');
    const searchBtn = document.getElementById('search-btn');
    const statusArea = document.getElementById('status-area');
    const resultsSection = document.getElementById('results-section');
    const resultsTitle = document.getElementById('results-title');
    const matchCountEl = document.getElementById('match-count');
    const resultsBody = document.getElementById('results-body');

    // --- Theme toggle ---
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('bol-theme', next);
    });

    // --- Utilities ---

    async function initPdfJs() {
      if (pdfjsLib) return;
      pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showStatus(message, type) {
      statusArea.innerHTML =
        '<div class="status-msg status-' + type + '">' + escapeHtml(message) + '</div>';
    }

    function clearStatus() {
      statusArea.innerHTML = '';
    }

    function extractCommaNumbers(lineText) {
      const matches = lineText.match(/\b\d{1,3}(,\d{3})+\b/g);
      if (!matches) return [];
      return matches.map(s => ({
        raw: s,
        value: parseInt(s.replace(/,/g, ''), 10)
      }));
    }

    // --- Line-aware PDF extraction ---

    function buildLineText(items) {
      let text = '';
      for (let i = 0; i < items.length; i++) {
        if (i > 0) {
          const prevEnd = items[i - 1].transform[4] + (items[i - 1].width || 0);
          const gap = items[i].transform[4] - prevEnd;
          text += gap > 10 ? '  ' : ' ';
        }
        text += items[i].str;
      }
      return text;
    }

    async function extractPageLines(page) {
      const content = await page.getTextContent();
      const items = content.items.filter(item => item.str.trim().length > 0);
      if (items.length === 0) return [];

      const Y_TOLERANCE = 3;

      // Sort by y descending (top to bottom on page)
      const sorted = [...items].sort((a, b) => b.transform[5] - a.transform[5]);

      const lineGroups = [];
      let currentLine = [sorted[0]];
      let currentY = sorted[0].transform[5];

      for (let i = 1; i < sorted.length; i++) {
        const item = sorted[i];
        const y = item.transform[5];
        if (Math.abs(y - currentY) <= Y_TOLERANCE) {
          currentLine.push(item);
        } else {
          lineGroups.push(currentLine);
          currentLine = [item];
          currentY = y;
        }
      }
      lineGroups.push(currentLine);

      // Sort each line left-to-right by x, then build text
      return lineGroups.map(group => {
        group.sort((a, b) => a.transform[4] - b.transform[4]);
        return buildLineText(group);
      });
    }

    // --- File handling ---

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf'))) {
        handleFile(file);
      } else {
        showStatus('Please drop a valid PDF file.', 'warn');
      }
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    async function handleFile(file) {
      clearStatus();
      resultsSection.hidden = true;

      try {
        await initPdfJs();
      } catch {
        showStatus('Failed to load PDF.js library. Check your internet connection.', 'error');
        return;
      }

      dropZone.hidden = true;
      progressArea.hidden = false;
      progressFill.style.width = '0%';
      progressText.textContent = 'Loading PDF...';

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;
        const pages = [];

        for (let i = 1; i <= totalPages; i++) {
          const page = await pdf.getPage(i);
          const lines = await extractPageLines(page);
          pages.push({ pageNum: i, lines });

          const pct = Math.round((i / totalPages) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = 'Extracting page ' + i + ' of ' + totalPages + '...';

          if (i % 5 === 0) {
            await new Promise(r => setTimeout(r, 0));
          }
        }

        pdfPages = pages;
        progressArea.hidden = true;
        fileInfo.hidden = false;
        fileNameEl.textContent = file.name;
        fileMetaEl.textContent =
          totalPages + ' pages \u00b7 ' + (file.size / (1024 * 1024)).toFixed(2) + ' MB';

        searchInput.disabled = false;
        searchClearBtn.disabled = false;
        searchBtn.disabled = false;
        searchInput.focus();
      } catch {
        progressArea.hidden = true;
        dropZone.hidden = false;
        showStatus(
          'Failed to extract PDF text. The file may be corrupted or password-protected.',
          'error'
        );
      }
    }

    // --- Clear / Reset ---

    fileClearBtn.addEventListener('click', () => {
      pdfPages = null;
      fileInfo.hidden = true;
      dropZone.hidden = false;
      searchInput.disabled = true;
      searchClearBtn.disabled = true;
      searchBtn.disabled = true;
      searchInput.value = '';
      fileInput.value = '';
      resultsSection.hidden = true;
      clearStatus();
    });

    // --- Search clear ---
    searchClearBtn.addEventListener('click', () => {
      searchInput.value = '';
      resultsSection.hidden = true;
      clearStatus();
      searchInput.focus();
    });

    // --- Search ---

    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    function performSearch() {
      clearStatus();
      resultsSection.hidden = true;

      if (!pdfPages) return;

      // Parse comma/space-separated job numbers
      const jobNumbers = searchInput.value.trim()
        .split(/[,\s]+/)
        .map(s => s.trim())
        .filter(s => s.length > 0)
        .map(s => { const m = s.match(/^(\d{6})/); return m ? m[1] : null; })
        .filter(Boolean);

      const uniqueJobs = [...new Set(jobNumbers)];

      if (uniqueJobs.length === 0) {
        showStatus('Enter at least one valid 6-digit job number.', 'warn');
        return;
      }
      if (uniqueJobs.length > 10) {
        showStatus('Maximum 10 job numbers at a time.', 'warn');
        return;
      }

      // Search for each job
      const allResults = [];
      let totalMatches = 0;

      for (const baseJob of uniqueJobs) {
        const pattern = new RegExp(
          '(?:^|[\\s,;|/\\-#:])(' + baseJob + '[A-Za-z0-9\\-]*)',
          'gi'
        );

        let matchCount = 0;
        const variants = new Set();
        const pagesWithMatches = new Set();
        const lineHits = new Map(); // "pageNum:lineIdx" -> { pageNum, lineText }

        for (const { pageNum, lines } of pdfPages) {
          for (let li = 0; li < lines.length; li++) {
            const line = lines[li];
            pattern.lastIndex = 0;
            let m;
            while ((m = pattern.exec(line)) !== null) {
              matchCount++;
              variants.add(m[1].toUpperCase());
              pagesWithMatches.add(pageNum);
              const key = pageNum + ':' + li;
              if (!lineHits.has(key)) {
                const commaNumbers = extractCommaNumbers(line);
                lineHits.set(key, {
                  pageNum,
                  lineText: line,
                  primaryQty: commaNumbers.length > 0 ? commaNumbers[0] : null,
                });
              }
            }
          }
        }

        totalMatches += matchCount;
        allResults.push({
          baseJob,
          matchCount,
          lineHits: [...lineHits.values()],
          variants: [...variants].sort(),
          pages: [...pagesWithMatches].sort((a, b) => a - b),
        });
      }

      renderResults(allResults, totalMatches);
    }

    // --- Search display helpers ---

    function truncateLine(line, baseJob) {
      if (line.length <= 200) return { text: line, pre: false, post: false };

      const idx = line.search(new RegExp(baseJob, 'i'));
      if (idx === -1) {
        return { text: line.substring(0, 200), pre: false, post: true };
      }

      let start = Math.max(0, idx - 100);
      let end = start + 200;
      if (end > line.length) {
        end = line.length;
        start = Math.max(0, end - 200);
      }

      return {
        text: line.substring(start, end),
        pre: start > 0,
        post: end < line.length,
      };
    }

    function highlightInLine(text, baseJob) {
      const pattern = new RegExp(
        '(?:^|[\\s,;|/\\-#:])(' + baseJob + '[A-Za-z0-9\\-]*)',
        'gi'
      );

      const spans = [];
      let m;
      while ((m = pattern.exec(text)) !== null) {
        const refStart = m.index + m[0].length - m[1].length;
        const refEnd = m.index + m[0].length;
        spans.push({ start: refStart, end: refEnd });
      }

      if (spans.length === 0) return escapeHtml(text);

      let html = '';
      let pos = 0;
      for (const s of spans) {
        html += escapeHtml(text.substring(pos, s.start));
        html += '<mark>' + escapeHtml(text.substring(s.start, s.end)) + '</mark>';
        pos = s.end;
      }
      html += escapeHtml(text.substring(pos));
      return html;
    }

    // --- Render results ---

    function renderResults(allResults, totalMatches) {
      resultsSection.hidden = false;
      resultsTitle.textContent = 'Results';
      matchCountEl.textContent =
        totalMatches + ' match' + (totalMatches !== 1 ? 'es' : '') +
        ' across ' + allResults.length + ' job' + (allResults.length !== 1 ? 's' : '');

      // Compute max quantity per job for headers and grand total
      const jobMaxQtys = allResults.map(({ lineHits }) => {
        const qtyValues = lineHits
          .filter(h => h.primaryQty)
          .map(h => h.primaryQty.value);
        return qtyValues.length > 0 ? Math.max(...qtyValues) : 0;
      });

      let html = '';

      // Grand total bar (only for 2+ jobs)
      if (allResults.length >= 2) {
        const grandTotal = jobMaxQtys.reduce((a, b) => a + b, 0);
        if (grandTotal > 0) {
          html += '<div class="grand-total">Total across ' + allResults.length +
            ' jobs: <strong>' + grandTotal.toLocaleString() + ' pcs</strong></div>';
        }
      }

      for (let ji = 0; ji < allResults.length; ji++) {
        const { baseJob, matchCount, lineHits, variants, pages } = allResults[ji];
        const maxQty = jobMaxQtys[ji];
        html += '<div class="job-group">';

        // Header with max quantity
        html += '<div class="job-group-header">';
        html += '<span class="job-group-number">' + escapeHtml(baseJob) + '</span>';
        if (maxQty > 0) {
          html += '<span class="job-group-total">' + maxQty.toLocaleString() + ' pcs</span>';
        }
        if (matchCount > 0) {
          html += '<span class="job-group-meta">' +
            matchCount + ' match' + (matchCount !== 1 ? 'es' : '') +
            ' on page' + (pages.length !== 1 ? 's' : '') + ' ' + pages.join(', ') +
            '</span>';
        } else {
          html += '<span class="job-group-meta">no matches</span>';
        }
        html += '</div>';

        // Variants (only if more than one)
        if (variants.length > 1) {
          html += '<div class="job-group-variants">Variants: ' +
            variants.map(v => escapeHtml(v)).join(', ') + '</div>';
        }

        // Match lines or no-results
        if (matchCount > 0) {
          html += '<div class="job-group-results">';
          for (const hit of lineHits) {
            const { text, pre, post } = truncateLine(hit.lineText, baseJob);
            const highlighted = highlightInLine(text, baseJob);
            html += '<div class="result-item">' +
              '<span class="page-badge">p.' + hit.pageNum + '</span>' +
              '<span class="result-context">' +
              (pre ? '\u2026' : '') + highlighted + (post ? '\u2026' : '') +
              '</span>';
            if (hit.primaryQty) {
              html += '<span class="result-qty">' + escapeHtml(hit.primaryQty.raw) + '</span>';
            }
            html += '</div>';
          }
          html += '</div>';
        } else {
          html += '<div class="job-group-no-results">No occurrences found in this document.</div>';
        }

        html += '</div>';
      }

      resultsBody.innerHTML = html;
      resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
